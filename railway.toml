[build]
builder = "NIXPACKS"

[build.nixpacksConfig]
# Install Playwright's browser binaries after pip installs requirements
aptPkgs = ["libnss3", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2", "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxfixes3", "libxrandr2", "libgbm1", "libasound2"]

[build.nixpacksConfig.phases.setup]
cmds = ["playwright install chromium"]

[deploy]
startCommand = "uvicorn server:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/health"
intervalSeconds = 30
timeoutSeconds = 10
