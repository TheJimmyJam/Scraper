providers = ["python"]

[phases.setup]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "libxml2",
  "libxslt",
  "gcc",
  "zlib"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium --with-deps"
]

[start]
cmd = "python -m uvicorn server:app --host 0.0.0.0 --port $PORT"
