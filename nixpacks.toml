[phases.setup]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "libnss3",
  "libatk1_0",
  "libatk-bridge2_0",
  "libcups2",
  "libdrm",
  "libxkbcommon",
  "libxcomposite",
  "libxdamage",
  "libxfixes",
  "libxrandr",
  "libgbm",
  "alsa-lib"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium"
]

[start]
cmd = "python -m uvicorn server:app --host 0.0.0.0 --port $PORT"
