providers = ["python"]

[phases.setup]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "gcc",
  "zlib",
  "libxml2",
  "libxslt"
]

[phases.install]
cmds = [
  "python3 -m pip install -r requirements.txt",
  "python3 -m playwright install chromium --with-deps"
]

[start]
cmd = "python3 -m uvicorn server:app --host 0.0.0.0 --port $PORT"
